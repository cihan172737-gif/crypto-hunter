name: crypto-hunter-alert

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # her 30 dk

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # --- SISTEM AYARLARI ---
          ALERT_ONLY: "1"        # 1: sadece sinyal formatlı mesaj
          SEND_IF_EMPTY: "1"     # 1: sinyal yoksa da Telegram’a “No alerts” gönder
          HTTP_TIMEOUT: "20"

          # --- 3’lü Funding eşikleri (negatif funding arıyoruz) ---
          # Tier-1 (mild)  : -0.03%
          # Tier-2 (mid)   : -0.06%
          # Tier-3 (strong): -0.10%
          FUNDING_LEVELS: "-0.0003,-0.0006,-0.0010"

          # --- 3’lü filtre ekleri ---
          # 1h mum ile bakıyoruz (daha az gürültü)
          KLINE_INTERVAL: "60"
          KLINE_LIMIT: "50"
          VOL_SPIKE: "1.8"         # son mum hacmi / önceki ortalama >= 1.8
          MOMENTUM_MODE: "close>prevclose"  # momentum kontrolü

          # --- 50 coin (hacimli / popüler) ---
          SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,DOGEUSDT,ADAUSDT,AVAXUSDT,LINKUSDT,MATICUSDT,DOTUSDT,LTCUSDT,ATOMUSDT,APTUSDT,OPUSDT,ARBUSDT,NEARUSDT,FILUSDT,ETCUSDT,SUIUSDT,AAVEUSDT,INJUSDT,RNDRUSDT,STXUSDT,IMXUSDT,SEIUSDT,TIAUSDT,GRTUSDT,FETUSDT,WLDUSDT,PEPEUSDT,BONKUSDT,SHIBUSDT,RUNEUSDT,DYDXUSDT,JTOUSDT,ORDIUSDT,PYTHUSDT,BLURUSDT,LDOUSDT,GMXUSDT,CRVUSDT,ENSUSDT,COMPUSDT,YFIUSDT,SANDUSDT,MANAUSDT,FLOWUSDT,CHZUSDT,AXSUSDT"

        run: python hunter.py
