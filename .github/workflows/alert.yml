name: crypto-hunter-alert

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Modlar
          ALERT_ONLY: "1"
          SEND_IF_EMPTY: "1"

          # Strateji ayarları
          WINDOW_MIN: "15"
          KLINE_INTERVAL: "5"
          MOVE_PCT: "0.35"
          VOL_FACTOR: "1.8"
          OI_CHANGE_PCT: "1.2"

          # Funding eşikleri
          FUNDING_NEG: "-0.0005"
          FUNDING_POS: "0.0005"

          # Semboller (istersen symbols.txt ile yönet)
          # SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT"
          BYBIT_BASE: "https://api.bybit.com"
          HTTP_TIMEOUT: "20"
        run: python hunter.py
