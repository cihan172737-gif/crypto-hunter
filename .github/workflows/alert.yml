name: crypto-hunter-alert

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # her 30 dk

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # --- bizim ayarlar ---
          ALERT_ONLY: "1"          # sadece sinyalde “ALERT” yazsın
          SEND_IF_EMPTY: "1"       # sinyal yoksa bile “No alerts” mesajı at
          THRESHOLD: "0.0005"      # funding temel eşik (istersek sonra değiştiririz)

          # 50 coin listesi (senin default)
          SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,DOGEUSDT,ADAUSDT,AVAXUSDT,LINKUSDT,MATICUSDT,DOTUSDT,LTCUSDT,ATOMUSDT,APTUSDT,OPUSDT,ARBUSDT,NEARUSDT,FILUSDT,ETCUSDT,SUIUSDT,AAVEUSDT,INJUSDT,RNDRUSDT,STXUSDT,IMXUSDT,SEIUSDT,TIAUSDT,GRTUSDT,FETUSDT,WLDUSDT,PEPEUSDT,BONKUSDT,SHIBUSDT,RUNEUSDT,DYDXUSDT,JTOUSDT,ORDIUSDT,PYTHUSDT,BLURUSDT,LDOUSDT,GMXUSDT,CRVUSDT,ENSUSDT,COMPUSDT,YFIUSDT,SANDUSDT,MANAUSDT,FLOWUSDT,CHZUSDT,AXSUSDT"

        run: python hunter.py
